<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f2eee2" />
<meta property="og:title" content="Most Likely / מי הכי?" />
<title>Most Likely — Party Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=Hanken+Grotesk:wght@500;600;700;800&family=Rubik:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
:root{
  --paper:#f2eee2; --ink:#17150f; --white:#ffffff;
  --lime:#c8f24a; --coral:#ff5b45; --blue:#3b62ff; --violet:#9d6bff; --sun:#ffcf3a; --pink:#ff5aa0; --teal:#17d3b0;
  --muted:#5c574c;
  --bd:2.5px solid var(--ink);
  --hs:6px 6px 0 var(--ink); --hs-sm:4px 4px 0 var(--ink); --hs-lg:9px 9px 0 var(--ink);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--ink);background:var(--paper);overflow-x:hidden;min-height:100dvh;position:relative;font-weight:600;}
html[dir="rtl"] body{font-family:'Rubik',system-ui,sans-serif;}
.sky{position:fixed;inset:0;z-index:-4;background:var(--paper);}
.stars{position:fixed;inset:0;z-index:-3;opacity:1;
  background-image:radial-gradient(circle, rgba(23,21,15,.08) 1.6px, transparent 1.7px);background-size:24px 24px;}
.glow{position:fixed;z-index:-3;border-radius:50%;filter:blur(70px);opacity:.35;}
.g1{width:340px;height:340px;background:var(--lime);top:-120px;left:-110px;}
.g2{width:300px;height:300px;background:var(--pink);bottom:-120px;right:-110px;}
.g3{width:260px;height:260px;background:var(--blue);top:46%;right:-130px;opacity:.22;}
.decor{position:fixed;z-index:-2;font-size:30px;filter:drop-shadow(2px 2px 0 rgba(23,21,15,.25));animation:drift 11s ease-in-out infinite;pointer-events:none;}
@keyframes drift{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-14px) rotate(8deg)}}
@media (max-width:640px){.decor{display:none;}}

#app{max-width:540px;margin:0 auto;padding:20px 20px calc(26px + env(safe-area-inset-bottom));min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1;}
.screen{flex:1;display:flex;flex-direction:column;animation:pop .45s cubic-bezier(.2,1.2,.4,1) both;}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px) rotate(-2deg)}to{opacity:1;transform:none}}

h1,h2,h3,.serif{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;margin:0;line-height:.98;letter-spacing:-.01em;}
html[dir="rtl"] h1,html[dir="rtl"] h2,html[dir="rtl"] h3,html[dir="rtl"] .serif{font-family:'Rubik',sans-serif;font-weight:900;}
.muted{color:var(--muted);} .center{text-align:center;}

.appbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;min-height:42px;}
.lang{display:inline-flex;background:var(--white);border:var(--bd);border-radius:999px;padding:3px;box-shadow:var(--hs-sm);}
.lang button{border:none;background:transparent;color:var(--ink);font-family:'Hanken Grotesk';font-weight:800;font-size:13px;padding:6px 14px;border-radius:999px;cursor:pointer;transition:.15s;}
html[dir="rtl"] .lang button{font-family:'Rubik';}
.lang button.on{background:var(--lime);}

.brand{text-align:center;margin-top:6vh;}
.brand .kicker{display:inline-block;font-family:'Hanken Grotesk';font-weight:800;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);background:var(--sun);border:var(--bd);border-radius:999px;padding:6px 14px;box-shadow:var(--hs-sm);transform:rotate(-2deg);}
html[dir="rtl"] .brand .kicker{letter-spacing:.06em;font-family:'Rubik';}
.brand h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(56px,18vw,92px);line-height:.9;margin-top:16px;color:var(--ink);text-transform:uppercase;}
.brand .h1gold{display:inline-block;background:var(--lime);border:var(--bd);box-shadow:var(--hs);padding:0 14px 4px;border-radius:14px;transform:rotate(-2deg);margin-top:8px;}
html[dir="rtl"] .brand h1{text-transform:none;}
.brand .sub{font-family:'Hanken Grotesk';font-weight:700;font-size:17px;color:var(--muted);margin-top:20px;line-height:1.5;}
html[dir="rtl"] .brand .sub{font-family:'Rubik';}
.brand .orbit{font-size:28px;letter-spacing:8px;margin-top:12px;}

.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;cursor:pointer;
  font-family:'Bricolage Grotesque','Hanken Grotesk';font-weight:800;font-size:19px;letter-spacing:.01em;color:var(--ink);
  padding:16px 22px;border:var(--bd);border-radius:16px;box-shadow:var(--hs);text-transform:uppercase;
  transition:transform .06s ease, box-shadow .06s ease;}
html[dir="rtl"] .btn{font-family:'Rubik';font-weight:800;text-transform:none;}
.btn:active{transform:translate(5px,5px);box-shadow:0 0 0 0 var(--ink);}
.btn:disabled{opacity:.5;pointer-events:none;box-shadow:var(--hs-sm);}
.btn.gold{background:var(--lime);}
.btn.cream{background:var(--white);}
.btn.ghost{background:var(--white);box-shadow:var(--hs-sm);font-size:15px;padding:12px;border-radius:13px;}
.btn.sm{font-size:14px;padding:10px 14px;border-radius:12px;box-shadow:var(--hs-sm);}
.stack{display:flex;flex-direction:column;gap:16px;} .stack.tight{gap:12px;}

.card{background:var(--white);border:var(--bd);border-radius:20px;padding:20px;box-shadow:var(--hs);position:relative;}
.field{width:100%;font-family:'Hanken Grotesk';font-weight:800;font-size:20px;text-align:center;color:var(--ink);
  background:var(--white);border:var(--bd);border-radius:12px;padding:14px;outline:none;box-shadow:var(--hs-sm);transition:.1s;}
html[dir="rtl"] .field{font-family:'Rubik';}
.field::placeholder{color:rgba(23,21,15,.32);}
.field:focus{background:#fffdf3;transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink);}
.label{font-family:'Hanken Grotesk';font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:0 0 9px 2px;}
html[dir="rtl"] .label{letter-spacing:.02em;font-family:'Rubik';text-transform:none;margin:0 2px 9px 0;}
.code-field{letter-spacing:.4em;text-transform:uppercase;font-size:28px;font-weight:800;direction:ltr;}

.avi{border-radius:50%;object-fit:cover;background:#ffe3ef;display:block;}
.avi.sm{width:34px;height:34px;border:2px solid var(--ink);} .avi.md{width:46px;height:46px;} .avi.fill{width:100%;height:100%;}
.avatars{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.av{aspect-ratio:1;border-radius:50%;cursor:pointer;border:var(--bd);box-shadow:var(--hs-sm);transition:transform .1s,box-shadow .1s;position:relative;background:var(--white);overflow:hidden;}
.av .avi{width:100%;height:100%;}
.av:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink);}
.av.selected{box-shadow:5px 5px 0 var(--ink);transform:translate(-1px,-1px) rotate(-3deg);outline:3px solid var(--lime);outline-offset:-3px;}

.chips{display:grid;gap:12px;} .chips.two{grid-template-columns:1fr 1fr;}
.chip{cursor:pointer;border:var(--bd);background:var(--white);border-radius:16px;padding:14px 12px;text-align:center;box-shadow:var(--hs-sm);transition:transform .08s,box-shadow .08s;}
.chip:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
.chip.selected{transform:translate(-1px,-1px) rotate(-1.5deg);box-shadow:var(--hs);}
.chips .chip:nth-child(1).selected{background:var(--lime);} .chips .chip:nth-child(2).selected{background:var(--coral);}
.chips .chip:nth-child(3).selected{background:var(--blue);color:var(--white);} .chips .chip:nth-child(4).selected{background:var(--sun);}
.seg .chip.selected{background:var(--lime);}
.badge{width:56px;height:56px;margin:0 auto 8px;border-radius:14px;display:flex;align-items:center;justify-content:center;border:var(--bd);box-shadow:var(--hs-sm);}
.chips .chip:nth-child(1) .badge{background:var(--lime);} .chips .chip:nth-child(2) .badge{background:var(--coral);}
.chips .chip:nth-child(3) .badge{background:var(--sun);} .chips .chip:nth-child(4) .badge{background:var(--teal);}
.badge svg{width:40px;height:40px;display:block;}
.chip .t{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;}
html[dir="rtl"] .chip .t{font-family:'Rubik';font-weight:800;}
.chip .d{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.25;font-family:'Hanken Grotesk';font-weight:600;}
html[dir="rtl"] .chip .d{font-family:'Rubik';}
.chip.selected .d{color:rgba(23,21,15,.7);}
.chips .chip:nth-child(3).selected .d{color:rgba(255,255,255,.85);}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.seg .chip{padding:11px 6px;}
.seg .chip .n{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;}
.seg .chip .u{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:800;}

.qr-card{text-align:center;background:var(--white);border:var(--bd);border-radius:20px;padding:20px;box-shadow:var(--hs);}
.qr-title{display:inline-block;font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;margin-bottom:16px;background:var(--sun);border:var(--bd);border-radius:10px;padding:4px 14px;box-shadow:var(--hs-sm);transform:rotate(-1.5deg);text-transform:uppercase;letter-spacing:.02em;}
html[dir="rtl"] .qr-title{font-family:'Rubik';text-transform:none;}
.qr-box{width:186px;height:186px;margin:0 auto;background:var(--white);border-radius:14px;padding:10px;border:var(--bd);box-shadow:var(--hs-sm);display:flex;align-items:center;justify-content:center;}
.qr-box img{width:100%;height:100%;display:block;}
.qr-box .qr-fallback{display:none;font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;letter-spacing:.06em;color:var(--ink);}
.qr-box.noqr img{display:none;} .qr-box.noqr .qr-fallback{display:flex;align-items:center;justify-content:center;height:100%;}
.qr-code{font-family:'Bricolage Grotesque';font-weight:800;font-size:36px;letter-spacing:.16em;direction:ltr;color:var(--ink);margin-top:16px;}

.ppl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 12px;}
.ppl{display:flex;flex-direction:column;align-items:center;gap:8px;animation:rise .35s both;}
.ppl-av{--ring:var(--lime);width:clamp(64px,20vw,84px);height:clamp(64px,20vw,84px);border-radius:50%;padding:4px;position:relative;background:var(--ring);border:var(--bd);box-shadow:var(--hs-sm);}
.ppl:nth-child(6n+1) .ppl-av{--ring:var(--lime)} .ppl:nth-child(6n+2) .ppl-av{--ring:var(--coral)} .ppl:nth-child(6n+3) .ppl-av{--ring:var(--blue)}
.ppl:nth-child(6n+4) .ppl-av{--ring:var(--sun)} .ppl:nth-child(6n+5) .ppl-av{--ring:var(--violet)} .ppl:nth-child(6n+6) .ppl-av{--ring:var(--teal)}
.ppl-av.host{--ring:var(--sun);box-shadow:5px 5px 0 var(--ink);transform:rotate(-3deg);}
.ppl-av .avi{width:100%;height:100%;border:2px solid var(--ink);}
.crown-badge{position:absolute;top:-12px;inset-inline-end:-8px;font-size:22px;transform:rotate(12deg);filter:drop-shadow(1px 1px 0 rgba(23,21,15,.3));}
.ppl-nm{font-family:'Hanken Grotesk';font-weight:800;font-size:14px;text-align:center;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);}
html[dir="rtl"] .ppl-nm{font-family:'Rubik';}

.q-card{background:var(--blue);color:var(--white);border:var(--bd);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:var(--hs);position:relative;}
.q-card .pre{font-family:'Hanken Grotesk';font-weight:800;font-size:13px;color:var(--lime);letter-spacing:.08em;text-transform:uppercase;position:relative;}
html[dir="rtl"] .q-card .pre{font-family:'Rubik';letter-spacing:.02em;text-transform:none;}
.q-card .q{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(25px,7.6vw,34px);line-height:1.08;margin-top:10px;position:relative;color:var(--white);}
html[dir="rtl"] .q-card .q{font-family:'Rubik';font-weight:900;}

.vote-main{flex:1;display:flex;flex-direction:column;gap:12px;min-height:0;overflow-y:auto;padding:8px 0 4px;}
.vote-grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:14px;}
.vote{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:var(--white);min-height:78px;container-type:size;
  border:var(--bd);border-radius:20px;padding:12px 8px;box-shadow:var(--hs-sm);transition:transform .08s,box-shadow .08s,background .1s;overflow:hidden;}
.vote:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
.vote.picked{background:var(--lime);transform:translate(-1px,-1px) rotate(-1deg);box-shadow:var(--hs);}
.vdisc{--ring:var(--coral);width:min(54cqh,86cqw,138px);height:min(54cqh,86cqw,138px);border-radius:50%;padding:4px;background:var(--ring);border:var(--bd);box-shadow:var(--hs-sm);}
.vote:nth-child(6n+1) .vdisc{--ring:var(--coral)} .vote:nth-child(6n+2) .vdisc{--ring:var(--blue)} .vote:nth-child(6n+3) .vdisc{--ring:var(--sun)}
.vote:nth-child(6n+4) .vdisc{--ring:var(--violet)} .vote:nth-child(6n+5) .vdisc{--ring:var(--teal)} .vote:nth-child(6n+6) .vdisc{--ring:var(--pink)}
.vdisc .avi{width:100%;height:100%;border:2px solid var(--ink);}
.vote .nm{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(15px,4.6cqw,19px);text-align:center;line-height:1.05;color:var(--ink);}
html[dir="rtl"] .vote .nm{font-family:'Rubik';font-weight:800;}
.progress-note{text-align:center;font-family:'Hanken Grotesk';font-weight:800;color:var(--muted);font-size:15px;}
html[dir="rtl"] .progress-note{font-family:'Rubik';}

.tally{display:flex;flex-direction:column;gap:10px;}
.trow{background:var(--white);border:var(--bd);border-radius:14px;padding:11px 13px;animation:rise .4s both;box-shadow:var(--hs-sm);}
.trow.top{background:var(--lime);box-shadow:var(--hs);transform:translate(-1px,-1px);}
.trow .head{display:flex;align-items:center;gap:11px;}
.trow .nm{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;flex:1;color:var(--ink);}
html[dir="rtl"] .trow .nm{font-family:'Rubik';font-weight:800;}
.trow .cnt{font-family:'Hanken Grotesk';font-weight:800;font-size:14px;color:var(--muted);}
.trow .plus{font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;color:var(--ink);background:var(--sun);border:2px solid var(--ink);border-radius:8px;padding:0 6px;}
.bar{height:12px;border-radius:999px;margin-top:9px;background:#fff;border:2px solid var(--ink);overflow:hidden;}
.bar > i{display:block;height:100%;background:var(--coral);width:0;transition:width .8s cubic-bezier(.2,1,.3,1);}
.crown-banner{text-align:center;padding:6px 0 2px;}
.crown-banner .cav{width:80px;height:80px;margin:0 auto;border-radius:50%;padding:4px;background:var(--sun);border:var(--bd);box-shadow:var(--hs);transform:rotate(-3deg);}
.crown-banner .cav .avi{width:100%;height:100%;border:2px solid var(--ink);}
.crown-banner .who{font-family:'Bricolage Grotesque';font-weight:800;font-size:25px;margin-top:10px;color:var(--ink);}
html[dir="rtl"] .crown-banner .who{font-family:'Rubik';font-weight:900;}
.crown-banner .cap{font-family:'Hanken Grotesk';font-weight:700;color:var(--muted);font-size:14px;}
html[dir="rtl"] .crown-banner .cap{font-family:'Rubik';}

.winner-card{margin:16px 0;border-radius:22px;padding:26px 22px 24px;text-align:center;position:relative;
  background:var(--lime);border:var(--bd);box-shadow:var(--hs-lg);}
.wframe{width:150px;height:150px;margin:0 auto 14px;border-radius:50%;padding:5px;position:relative;background:var(--white);border:var(--bd);box-shadow:var(--hs);transform:rotate(-3deg);}
.wframe .avi{width:100%;height:100%;border:2px solid var(--ink);}
.wframe .sparkle{position:absolute;font-size:26px;top:-14px;inset-inline-end:-6px;transform:rotate(14deg);}
.wlabel{display:inline-block;font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--white);background:var(--ink);border-radius:8px;padding:4px 12px;transform:rotate(-1.5deg);}
html[dir="rtl"] .wlabel{letter-spacing:.04em;font-family:'Rubik';}
.wname{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(36px,11vw,52px);margin-top:10px;color:var(--ink);text-transform:uppercase;line-height:1;}
html[dir="rtl"] .wname{font-family:'Rubik';font-weight:900;text-transform:none;}
.bars{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
.bar-row .bar-head{display:flex;justify-content:space-between;font-family:'Hanken Grotesk';font-weight:800;font-size:15px;margin-bottom:5px;color:var(--ink);}
html[dir="rtl"] .bar-row .bar-head{font-family:'Rubik';}
.bar-row .pctv{color:var(--ink);}
.rbar{height:14px;border-radius:999px;background:#fff;border:var(--bd);overflow:hidden;box-shadow:var(--hs-sm);}
.rbar > i{display:block;height:100%;background:var(--coral);width:0;transition:width .9s cubic-bezier(.2,1,.3,1);}
.bars .bar-row:nth-child(1) .rbar>i{background:var(--coral)} .bars .bar-row:nth-child(2) .rbar>i{background:var(--blue)}
.bars .bar-row:nth-child(3) .rbar>i{background:var(--violet)} .bars .bar-row:nth-child(4) .rbar>i{background:var(--teal)}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px;}
.pill{font-family:'Hanken Grotesk';font-weight:800;font-size:12.5px;padding:6px 12px;border-radius:999px;background:var(--white);border:var(--bd);color:var(--ink);white-space:nowrap;box-shadow:var(--hs-sm);}
html[dir="rtl"] .pill{font-family:'Rubik';}
.pill b{color:var(--ink);}
.spacer{flex:1;} .mt{margin-top:16px;} .mt-s{margin-top:10px;} .mt-l{margin-top:24px;}
.hint{text-align:center;color:var(--muted);font-size:14px;line-height:1.45;font-family:'Hanken Grotesk';font-weight:700;}
html[dir="rtl"] .hint{font-family:'Rubik';}
.link{color:var(--ink);font-weight:800;cursor:pointer;background:none;border:none;font-family:'Hanken Grotesk';font-size:14px;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px;}
html[dir="rtl"] .link{font-family:'Rubik';}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--white);font-family:'Bricolage Grotesque';font-weight:800;
  padding:12px 20px;border-radius:999px;box-shadow:var(--hs);opacity:0;transition:.3s;z-index:99;pointer-events:none;font-size:15px;border:2px solid var(--ink);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.err{color:var(--coral);font-family:'Hanken Grotesk';font-weight:800;text-align:center;font-size:15px;min-height:20px;}
.mini-lead{display:flex;flex-direction:column;gap:8px;}
.ml-row{display:flex;align-items:center;gap:10px;font-family:'Hanken Grotesk';font-weight:800;font-size:15px;background:var(--white);border:2px solid var(--ink);border-radius:12px;padding:7px 12px;color:var(--ink);box-shadow:var(--hs-sm);}
html[dir="rtl"] .ml-row{font-family:'Rubik';}
.ml-row .r{width:24px;text-align:center;}
.ml-row .nm{flex:1;} .ml-row .sc{color:var(--ink);background:var(--lime);border:2px solid var(--ink);border-radius:8px;padding:0 8px;font-weight:800;}
.divider{height:2.5px;background:var(--ink);border-radius:2px;margin:18px 0;}
.picker-preview{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:14px;}
.picker-preview .btn{width:auto;}
.pp-frame{width:88px;height:88px;border-radius:50%;padding:4px;background:var(--lime);border:var(--bd);box-shadow:var(--hs-sm);flex:none;}
.pp-frame .avi{width:100%;height:100%;border:2px solid var(--ink);}
.shuffle{white-space:nowrap;}
.style-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}

function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1900); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function genCode(){ const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<4;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function qText(pack, idx){ const p=PACKS[pack]; if(!p||idx==null||!p.q[idx]) return ''; return p.q[idx][App.lang]||p.q[idx].en; }
function packName(k){ return PACKS[k].name[App.lang]||PACKS[k].name.en; }
function inviteUrl(){ return location.origin+location.pathname+'?room='+App.room.code+'&lang='+App.lang; }

function saveSession(){ try{ localStorage.setItem('wml2', JSON.stringify({roomId:App.room&&App.room.id, playerId:App.me&&App.me.id})); }catch(e){} }

  if(App.view==='home') return renderHome();

  if(App.view==='room'){
    const st = App.room && App.room.status;
    if(st==='lobby') return renderLobby();
    if(st==='voting') return renderVoting();

}

  const max = Math.max(0,...Object.values(tally));
  const ranked = [...App.players].sort((a,b)=>tally[b.id]-tally[a.id]);
  const winners = App.players.filter(p=>tally[p.id]===max && max>0);
  const isHost = App.me && App.me.is_host;
  const last = round>=App.room.total_rounds;
  const lead = [...App.players].sort((a,b)=>b.score-a.score);

    </div>

/* ===================== CREATE / JOIN ===================== */
async function doCreate(){
  if(App.busy) return;
  const name=($('cname').value||'').trim();
  if(name.length<1){ $('cerr').textContent=t('enterName'); return; }
  App.busy=true; const btn=$('cbtn'); btn.disabled=true; btn.textContent=t('creating');
  const myId = crypto.randomUUID();
  let room=null;
  for(let attempt=0; attempt<6 && !room; attempt++){
    const { data, error } = await sb.from('wml_rooms').insert({
      code:genCode(), status:'lobby', mode:App.pendingMode, pack:App.pendingPack,
      round:0, total_rounds:App.pendingRounds, host_id:myId
    }).select().single();
    if(!error){ room=data; break; }
  }
  if(!room){ App.busy=false; btn.disabled=false; btn.textContent=t('createGame'); $('cerr').textContent='⚠️'; return; }
  const { data:me, error:pErr } = await sb.from('wml_players').insert({
    id:myId, room_id:room.id, name, avatar:App.pendingAvatar, is_host:true
  }).select().single();
  if(pErr){ App.busy=false; btn.disabled=false; btn.textContent=t('createGame'); $('cerr').textContent='⚠️'; return; }
  App.room=room; App.me=me; App.busy=false; await enterRoom();
}
async function doJoin(){
  if(App.busy) return;
  const code=($('jcode').value||'').trim().toUpperCase();
  const name=($('jname').value||'').trim();
  if(code.length<4){ $('jerr').textContent=t('enterCode'); return; }
  if(name.length<1){ $('jerr').textContent=t('enterBoth'); return; }
  App.busy=true; const btn=$('jbtn'); btn.disabled=true; btn.textContent=t('joining');
  const { data:room, error } = await sb.from('wml_rooms').select().eq('code',code).maybeSingle();
  if(error||!room){ App.busy=false; btn.disabled=false; btn.textContent=t('join'); $('jerr').textContent=t('noGame'); return; }
  if(room.status==='finished'){ App.busy=false; btn.disabled=false; btn.textContent=t('join'); $('jerr').textContent=t('ended'); return; }
  const myId = crypto.randomUUID();
  const { data:me, error:pErr } = await sb.from('wml_players').insert({
    id:myId, room_id:room.id, name, avatar:App.pendingAvatar, is_host:false
  }).select().single();
  if(pErr){ App.busy=false; btn.disabled=false; btn.textContent=t('join'); $('jerr').textContent='⚠️'; return; }
  App.room=room; App.me=me; App.busy=false; await enterRoom();
}

/* ===================== ROOM LIFECYCLE ===================== */
async function enterRoom(){
  App.view='room'; saveSession();
  await Promise.all([loadRoom(), loadPlayers(), loadVotes()]);
  subscribe(); await ensureHost(); render(); startPolling();
}
async function loadRoom(){ const { data } = await sb.from('wml_rooms').select().eq('id',App.room.id).maybeSingle(); if(data) App.room=data; }
async function loadPlayers(){
  const { data } = await sb.from('wml_players').select().eq('room_id',App.room.id).order('created_at');
  App.players=data||[];
  const mine = App.players.find(p=>p.id===(App.me&&App.me.id));
  if(mine) App.me = mine;
}
async function loadVotes(){
  const rnd=(App.room&&App.room.round)||0;
  const { data } = await sb.from('wml_votes').select().eq('room_id',App.room.id).eq('round',rnd);
  App.votes=data||[];
  App.votesRound=rnd;
  const mine=App.votes.find(v=>v.voter_id===(App.me&&App.me.id));
  App.myVote=mine?mine.target_id:null;
}
function subscribe(){
  if(App.channel){ sb.removeChannel(App.channel); App.channel=null; }
  const rid=App.room.id;
  App.channel = sb.channel('wml2-'+rid)
    .on('postgres_changes',{event:'*',schema:'public',table:'wml_rooms',filter:'id=eq.'+rid}, onRoomChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'wml_players',filter:'room_id=eq.'+rid}, onPlayersChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'wml_votes',filter:'room_id=eq.'+rid}, onVotesChange)
    .subscribe();
}
// Decide full-render vs in-place patch after live data changed (shared by realtime + polling).
function reconcile(beforeKey, beforeSig){
  const afterKey=screenKey(), afterSig=stateSig();
  if(afterKey!==beforeKey) render();            // real screen change → full render
  else if(afterSig!==beforeSig) softUpdate();   // same screen, data moved → patch in place (no flicker)
}
async function onRoomChange(payload){
  const bk=screenKey(), bs=stateSig();
  const prev = App.room; App.room = payload.new;
  if(!prev || prev.round!==App.room.round){ App._revealing=false; await loadVotes(); }
  if(App.room.status==='voting' && (!prev || prev.status!=='voting')) App._revealing=false;
  reconcile(bk, bs);
}
async function onPlayersChange(){ const bk=screenKey(), bs=stateSig(); await loadPlayers(); await ensureHost(); maybeAutoReveal(); reconcile(bk, bs); }
async function onVotesChange(){ const bk=screenKey(), bs=stateSig(); await loadVotes(); maybeAutoReveal(); reconcile(bk, bs); }

function stateSig(){
  return JSON.stringify({ s:App.room&&App.room.status, r:App.room&&App.room.round, q:App.room&&App.room.current_question,
    m:App.me&&App.me.is_host, p:App.players.map(p=>p.id+':'+(p.is_host?1:0)+':'+p.score),
    v:App.votes.map(v=>v.voter_id+'>'+v.target_id).sort() });
}
// Which "screen" is showing — a change here means a real transition (full render).
// Same key + different stateSig = same screen, only live data moved (patch in place, no rebuild).
function screenKey(){
  if(App.view!=='room') return App.view;
  return 'room|'+(App.room&&App.room.status)+'|'+(App.room&&App.room.round);
}
// Full render but keep the user where they were (no scroll jump / no avatar re-flash on mid-screen updates).
function renderKeepScroll(){ const y=window.scrollY; render(); window.scrollTo(0,y); }
// Patch only the parts that changed on the current screen, leaving the DOM (and scroll) intact.
function softUpdate(){
  const st=App.room&&App.room.status;
  if(st==='voting') return softVoting();
  if(st==='lobby') return softLobby();
  renderKeepScroll();
}
function softVoting(){
  // roster changed mid-round → grid must be rebuilt
  if(document.querySelectorAll('.vote-grid .vote').length!==App.players.length) return renderKeepScroll();
  const voters=new Set(App.votes.map(v=>v.voter_id));
  const votedCount=voters.size, total=App.players.length;
  const everyone=votedCount>=total&&total>0;
  const isHost=App.me&&App.me.is_host;
  const g=document.getElementById.bind(document);
  if(g('vCount')) g('vCount').innerHTML=`${votedCount}/${total} ${esc(t('lockedIn'))}`;
  if(g('vLabel')) g('vLabel').textContent=App.myVote?t('youVoted'):t('tapPick');
  if(g('vNote')) g('vNote').textContent=everyone?t('everyoneVoted'):(App.myVote?t('waitingOthers'):t('lockVote'));
  document.querySelectorAll('.vote-grid .vote').forEach(n=>n.classList.toggle('picked', n.getAttribute('data-id')===App.myVote));
  if(g('vAction')) g('vAction').innerHTML = isHost ? `<button class="btn gold" onclick="revealRound()">${everyone?esc(t('reveal')):esc(t('revealSkip'))}</button>` : `<div class="hint mt-s">${esc(t('hostReveals'))}</div>`;
}
function softLobby(){
  const isHost=App.me&&App.me.is_host;
  const enough=App.players.length>=2;
  const hasHost=App.players.some(x=>x.is_host);
  const g=document.getElementById.bind(document);
  if(g('lCount')) g('lCount').textContent='('+App.players.length+')';
  if(g('lGrid')) g('lGrid').innerHTML=App.players.map(pl=>`<div class="ppl">
      <div class="ppl-av ${pl.is_host?'host':''}">${avImg(pl.avatar,'fill')}${pl.is_host?'<span class="crown-badge">👑</span>':''}</div>
      <div class="ppl-nm">${esc(pl.name)}${pl.id===App.me.id?' · '+esc(t('you')):''}</div>
    </div>`).join('');
  if(g('lAction')) g('lAction').innerHTML = isHost ? `
      <button class="btn gold" ${enough?'':'disabled'} onclick="startGame()">${enough?esc(t('startGame')):esc(t('waitingPlayers'))}</button>
      <div class="hint mt-s">${enough?esc(t('allIn')):esc(t('needTwo'))}</div>
    ` : `
      <div class="hint mt">${esc(t('waitingHost'))}</div>
      ${!hasHost?`<button class="link mt-s" style="display:block;margin:8px auto 0" onclick="takeHost()">${esc(t('takeover'))}</button>`:''}
    `;
}
let _polling=false;
async function pollTick(){
  if(!App.room||!App.me||App.view!=='room'||_polling) return;
  _polling=true;
  try{
    const beforeKey=screenKey(), beforeSig=stateSig();
    await Promise.all([loadRoom(), loadPlayers(), loadVotes()]);
    await ensureHost(); maybeAutoReveal();
    const afterKey=screenKey(), afterSig=stateSig();
    if(afterKey!==beforeKey) render();            // real screen change → full render (scroll to top is expected)
    else if(afterSig!==beforeSig) softUpdate();   // same screen, data moved → patch in place
  }catch(e){}
  _polling=false;
}
function startPolling(){ stopPolling(); App._poll=setInterval(pollTick, 2500); }
function stopPolling(){ if(App._poll){ clearInterval(App._poll); App._poll=null; } }

async function ensureHost(){
  if(!App.me || !App.room || App.room.status==='finished') return;
  if(App.players.length===0) return;
  if(App.players.some(p=>p.is_host)) return;
  const oldest = App.players[0];
  if(oldest && oldest.id===App.me.id){ await sb.from('wml_players').update({is_host:true}).eq('id',App.me.id); App.me.is_host=true; }
}
async function takeHost(){
  if(!App.me) return;
  await sb.from('wml_players').update({is_host:false}).eq('room_id',App.room.id);
  await sb.from('wml_players').update({is_host:true}).eq('id',App.me.id);
  App.me.is_host=true; toast(t('takeoverDone'));
}
function maybeAutoReveal(){
  if(!App.me || !App.me.is_host) return;
  if(!App.room || App.room.status!=='voting' || App._revealing) return;
  if(App.votesRound!==App.room.round) return; // votes not yet refreshed for this round — never reveal on stale data
  const voters=new Set(App.votes.map(v=>v.voter_id));
  if(App.players.length>0 && voters.size>=App.players.length){
    setTimeout(()=>{ if(App.room && App.room.status==='voting' && !App._revealing && App.votesRound===App.room.round){ const vs=new Set(App.votes.map(v=>v.voter_id)); if(vs.size>=App.players.length) revealRound(); } }, 700);
  }
}

/* ===================== HOST ACTIONS ===================== */
async function startGame(){
  if(!App.me || !App.me.is_host) return;
  const pack=PACKS[App.room.pack]||PACKS.party;
  const idxs=shuffle(pack.q.map((_,i)=>i)).slice(0, App.room.total_rounds);
  await sb.from('wml_rooms').update({status:'voting', round:1, questions:idxs, current_question:String(idxs[0])}).eq('id',App.room.id);
  await pollTick();
}
async function revealRound(){
  if(!App.me || !App.me.is_host || App._revealing) return;
  if(App.room.status!=='voting') return;
  App._revealing=true;
  await loadVotes(); await loadPlayers();
  const tally={}; App.votes.forEach(v=>{ tally[v.target_id]=(tally[v.target_id]||0)+1; });
  for(const p of App.players){ const got=tally[p.id]||0; if(got>0){ await sb.from('wml_players').update({score:p.score+got}).eq('id',p.id); } }
  await sb.from('wml_rooms').update({status:'reveal'}).eq('id',App.room.id);
  App._revealing=false; await pollTick();
}
async function nextRound(){
  if(!App.me || !App.me.is_host) return;
  const r=App.room;
  if(r.round>=r.total_rounds){ await sb.from('wml_rooms').update({status:'finished'}).eq('id',r.id); }
  else{
    const nr=r.round+1; const idx=(r.questions&&r.questions[nr-1]!=null)?r.questions[nr-1]:0;
    App._revealing=false;
    await sb.from('wml_rooms').update({status:'voting', round:nr, current_question:String(idx)}).eq('id',r.id);
  }
  await pollTick();
}
async function playAgain(){
  if(!App.me || !App.me.is_host) return;
  await sb.from('wml_votes').delete().eq('room_id',App.room.id);
  await sb.from('wml_players').update({score:0,has_voted:false}).eq('room_id',App.room.id);
  App._revealing=false;
  await sb.from('wml_rooms').update({status:'lobby', round:0, questions:[], current_question:null}).eq('id',App.room.id);
  await pollTick();
}

/* ===================== PLAYER ACTIONS ===================== */
async function castVote(targetId){
  if(App.room.status!=='voting') return;
  App.myVote=targetId; softVoting();
  const { error } = await sb.from('wml_votes').upsert(
    { room_id:App.room.id, round:App.room.round, voter_id:App.me.id, target_id:targetId },
    { onConflict:'room_id,round,voter_id' });
  if(error){ toast(t('voteFail')); }
}
async function leaveRoom(){
  stopPolling();
  try{ if(App.me) await sb.from('wml_players').delete().eq('id',App.me.id); }catch(e){}
  if(App.channel){ sb.removeChannel(App.channel); App.channel=null; }
  clearSession();
  App.room=null; App.me=null; App.players=[]; App.votes=[]; App.myVote=null; App.view='home'; render();
}
async function shareRoom(){
  const url=inviteUrl();
  const text=(App.lang==='he'?'בואו לשחק מי הכי? קוד: ':'Join my Most Likely game! Code: ')+App.room.code;
  if(navigator.share){ try{ await navigator.share({title:App.lang==='he'?'מי הכי?':'Most Likely', text, url}); return; }catch(e){} }
  try{ await navigator.clipboard.writeText(url); toast(t('copied')); }catch(e){ toast(App.room.code); }
}

/* ===================== CONFETTI ===================== */
function fireConfetti(){
  if(typeof confetti!=='function') return;
  const colors=['#e6c780','#f3a6c0','#c3b3f2','#a6e3d0','#f5efe2','#a6c8f3'];
  confetti({particleCount:130,spread:85,origin:{y:.35},colors});
  setTimeout(()=>confetti({particleCount:70,angle:60,spread:70,origin:{x:0},colors}),200);
  setTimeout(()=>confetti({particleCount:70,angle:120,spread:70,origin:{x:1},colors}),350);
}

/* ===================== BOOT ===================== */
async function boot(){
  const params=new URLSearchParams(location.search);
  try{ const sv=localStorage.getItem('wml_lang'); if(sv==='he'||sv==='en') App.lang=sv; }catch(e){}
  const langParam=params.get('lang'); if(langParam==='he'||langParam==='en'){ App.lang=langParam; try{ localStorage.setItem('wml_lang',langParam); }catch(e){} }
  applyLang();
  const roomParam=params.get('room');
  let saved=null; try{ saved=JSON.parse(localStorage.getItem('wml2')||'null'); }catch(e){}
  if(saved && saved.roomId && saved.playerId){
    const { data:room } = await sb.from('wml_rooms').select().eq('id',saved.roomId).maybeSingle();
    const { data:me } = room ? await sb.from('wml_players').select().eq('id',saved.playerId).maybeSingle() : {data:null};
    if(room && me){ App.room=room; App.me=me; await enterRoom(); return; }
    clearSession();
  }
  if(roomParam){ App.view='join'; render(roomParam.toUpperCase()); return; }
  render();
}
boot();
</script>
